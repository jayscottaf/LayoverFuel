<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />

    <title>Layover Fuel</title>

    <!-- Favicon and App Icons -->
    <link rel="icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- PWA Manifest & Theme Colors -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1E40AF" /> <!-- Default/fallback -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph Meta (for social sharing) -->
    <meta property="og:title" content="Layover Fuel" />
    <meta property="og:description" content="Your personal nutrition and fitness assistant for travel." />
    <meta property="og:image" content="/icons/icon-512.png" />
    <meta property="og:url" content="https://layover-fuel.vercel.app" />
    <meta property="og:type" content="website" />

    <!-- Twitter Meta -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Layover Fuel" />
    <meta name="twitter:description" content="Your personal nutrition and fitness assistant for travel." />
    <meta name="twitter:image" content="/icons/icon-512.png" />
  </head>
  <body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script>
      function App() {
        return React.createElement('div', {
          style: { 
            minHeight: '100vh', 
            backgroundColor: '#f9fafb', 
            display: 'flex', 
            alignItems: 'center', 
            justifyContent: 'center' 
          }
        }, React.createElement('div', {
          style: { textAlign: 'center' }
        }, [
          React.createElement('h1', { 
            key: 'title',
            style: { 
              fontSize: '2.5rem', 
              fontWeight: 'bold', 
              color: '#111827', 
              marginBottom: '1rem' 
            } 
          }, 'Layover Fuel'),
          React.createElement('p', { 
            key: 'subtitle',
            style: { 
              fontSize: '1.25rem', 
              color: '#6b7280', 
              marginBottom: '2rem' 
            } 
          }, 'Your fitness companion for travelers'),
          React.createElement('div', {
            key: 'buttons',
            style: { display: 'flex', gap: '1rem', justifyContent: 'center' }
          }, [
            React.createElement('a', {
              key: 'chat',
              href: '/api/dashboard',
              style: {
                backgroundColor: '#2563eb',
                color: 'white',
                padding: '0.75rem 1.5rem',
                borderRadius: '0.5rem',
                textDecoration: 'none',
                fontWeight: '500'
              }
            }, 'Start Chat'),
            React.createElement('a', {
              key: 'dashboard',
              href: '/api/dashboard',
              style: {
                backgroundColor: '#6b7280',
                color: 'white',
                padding: '0.75rem 1.5rem',
                borderRadius: '0.5rem',
                textDecoration: 'none',
                fontWeight: '500'
              }
            }, 'Dashboard')
          ])
        ]));
      }
      
      ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
    </script>
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
